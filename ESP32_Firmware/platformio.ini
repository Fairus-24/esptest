[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200

# WiFi & HTTP Libraries (Essential)
lib_deps =
    DHT sensor library for ESPx@1.19.0
    knolleary/PubSubClient@2.8
    bblanchon/ArduinoJson@6.21.3

# Build settings
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -DHTTP_CLIENT_TIMEOUT=5000
    -DMQTT_MAX_PACKET_SIZE=2048
    -DESP_HTTP_INGEST_KEY=\"a49f402364c2ed5eaaf26f57dde011600d0e5e320546ba13d33adf38e500e3fc\"
    -DESP_HTTP_BASE_URL=\"https://espdht.mufaza.my.id\"
    -DESP_MQTT_BROKER=\"202.154.58.51\"
    -DESP_HTTP_TLS_INSECURE=1
    -DESP_SENSOR_INTERVAL_MS=12000UL
    -DESP_SENSOR_SNAPSHOT_MAX_AGE_MS=20000UL
    -DESP_SENSOR_FALLBACK_MAX_AGE_MS=60000UL
    -DESP_SENSOR_EMERGENCY_MAX_AGE_MS=180000UL
    -DESP_SENSOR_RECOVERY_INTERVAL_MS=6500UL
    -DESP_HTTP_POST_RETRY_MAX=2
    -DESP_HTTP_POST_RETRY_BACKOFF_MS=250
    -DESP_HTTP_READ_TIMEOUT_MS=3500
    -DESP_REMOTE_DEBUG_ENABLED=1
    -DESP_REMOTE_DEBUG_TOPIC=\"iot/esp32/debug\"
    -DESP_REMOTE_DEBUG_QUEUE_SIZE=24
    -DESP_REMOTE_DEBUG_MAX_MESSAGE_LEN=220
    -DESP_REMOTE_DEBUG_FLUSH_BURST=4
    -DESP_REMOTE_DEBUG_MIN_INTERVAL_MS=120UL

# Upload speed
upload_speed = 921600

# Serial port (change based on your system)
# On Windows: COM3, COM4, etc.
# On Linux: /dev/ttyUSB0, /dev/ttyACM0, etc.
# On macOS: /dev/cu.usbserial-*
monitor_port = COM5
upload_port = COM5
