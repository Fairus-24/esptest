[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200

# WiFi & HTTP Libraries
lib_deps =
    adafruit/Adafruit DHT sensor library @ ^1.4.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.3
    bodmer/TFT_eSPI @ ^2.5.34 (optional, for display)
    https://github.com/tzapu/WiFiManager.git

# Build settings
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -DHTTP_CLIENT_TIMEOUT=5000
    -DMQTT_MAX_PACKET_SIZE=2048

# Upload speed
upload_speed = 921600

# Serial port (change based on your system)
# On Windows: COM3, COM4, etc.
# On Linux: /dev/ttyUSB0, /dev/ttyACM0, etc.
# On macOS: /dev/cu.usbserial-*
monitor_port = COM3
upload_port = COM3
